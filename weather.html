<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City - Check city weather</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #4b0082, #7a3ea1); /* to'qroq purple gradient */
            color: #fff;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: rgba(50, 0, 50, 0.85);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #fff3;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ffd700; /* gold */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        nav ul li a:hover {
            background-color: #ffd70033;
            color: #ffeb3b;
        }

        /* Main */
        .div {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .weather-box {
            background-color: rgba(0,0,0,0.4);
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .weather-box h1 {
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 1px 1px 4px #000;
        }

        .weather-box input {
            width: 80%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .weather-box button {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: #ffb700;
            color: #000;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .weather-box button:hover {
            background: #ffa500;
        }

        #result {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #ffecb3;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .weather-box input {
                width: 100%;
            }

            nav ul {
                flex-direction: column;
                gap: 10px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<header class="header">
    <div class="logo">Smart City</div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="weather.html">Weather</a></li>
            <li><a href="contact.html">Contact us</a></li>
        </ul>
    </nav>
</header>

<div class="div">
    <div class="weather-box">
        <h1>Check City Weather ⛅</h1>
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Get Weather</button>
        <div id="result"></div>
    </div>
</div>

<script>
    
function getWeather() {
    const city = document.getElementById("city").value.trim();
    const result = document.getElementById("result");

    if (city === "") {
        result.innerText = "Please enter a city name!";
        return;
    }

    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}`)
        .then(response => response.json())
        .then(data => {
            if (!data.results || data.results.length === 0) {
                throw new Error("City not found");
            }

            const foundCity = data.results[0].name;
            const country = data.results[0].country || null;

            // Agar kiritilgan nom bilan topilgan nom mos kelmasa yoki davlat ma'lumoti bo'lmasa
            if (foundCity.toLowerCase() !== city.toLowerCase() || !country) {
                throw new Error("City not found");
            }

            const lat = data.results[0].latitude;
            const lon = data.results[0].longitude;

            return fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
            )
            .then(response => response.json())
            .then(weatherData => ({
                weatherData,
                foundCity,
                country
            }));
        })
        .then(data => {
            const weather = data.weatherData.current_weather;

            result.innerHTML = `
                <h3>${data.foundCity}, ${data.country}</h3><br>
                <p>Temperature: ${weather.temperature}°C</p><br>
                <p>Wind Speed: ${weather.windspeed} km/h</p><br>
                <p>Wind Direction: ${weather.winddirection}°</p>
            `;
        })
        .catch(() => {
            result.innerText = "City not found!";
        });
}

</script>
</body>
</html>
