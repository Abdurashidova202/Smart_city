<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body */
        body {
            font-family: 'Arial', sans-serif;
            /* To'qroq purple gradient */
            background: linear-gradient(135deg, #4b0082, #7a3ea1);
            color: #fff;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: rgba(50, 0, 50, 0.85); /* to‘qroq purple */
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #fff3;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #ffd700; /* gold */
        }

        .nav-list {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-list li a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-list li a:hover {
            background-color: #ffd70033; /* transparent gold */
            color: #ffeb3b; /* gold */
        }

        /* Main Section */
        #main {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px;
            flex-direction: column;
            gap: 20px;
        }

        #main h1 {
            font-size: 2.7rem;
            color: #ffd700; /* gold */
            text-shadow: 2px 2px 6px #000;
        }

        #main p {
            font-size: 1.3rem;
            color: #f5f5f5; /* off-white */
        }

        #btn {
            padding: 14px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #ffb700; /* to‘qroq gold */
            color: #000;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #btn:hover {
            background: #ffa500; /* orange-gold */
        }

        #h4 {
            font-size: 1.2rem;
            margin-top: 15px;
            color: #ffecb3; /* soft yellow */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }

            .nav-list {
                flex-direction: column;
                gap: 10px;
            }

            #main h1 {
                font-size: 2.2rem;
            }

            #main p {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            #main h1 {
                font-size: 1.8rem;
            }

            #main p {
                font-size: 0.95rem;
            }

            #btn {
                padding: 10px 22px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!--Header-->
    <header class="header">
        <div class="logo">Smart City</div>
        <nav class="nav">
            <ul class="nav-list">
                <li> <a href="index.html">Home</a></li>
                <li> <a href="weather.html">Weather</a></li>
                <li> <a href="contact.html">Contact us</a></li>
            </ul>
        </nav>
    </header>

    <!--Main-->
    <nav id="main">
        <h1>Welcome to My Smart City 🌆</h1>
        <p>Explore weather, contact us and learn JavaScript!</p>
        <button onclick="btn()" id="btn">Click me</button>
        <h4 id="h4"></h4>
    </nav>

    <script>
        function btn(){
            const h4 = document.getElementById("h4");
            h4.innerText = "On this webpage you learn JavaScript! 🎉";
            h4.style.color="#ffd700"; // gold
        }
    </script>
</body>
</html>
