<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart City - Contact Us</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4b0082, #7a3ea1); /* To'qroq purple gradient */
            color: #fff;
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background-color: rgba(50, 0, 50, 0.85);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700; /* gold */
        }

        .header ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .header ul li a {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .header ul li a:hover {
            background-color: #ffd70033;
            color: #ffeb3b;
        }

        /* Contact Box */
        .contact-box {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            margin: 80px auto;
            border-radius: 15px;
            text-align: center;
        }

        .contact-box h1 {
            margin-bottom: 25px;
            color: #ffd700;
            text-shadow: 1px 1px 4px #000;
        }

        .contact-box input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
        }

        .contact-box button {
            width: 100%;
            padding: 12px;
            background-color: #ffb700; /* gold */
            color: #000;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .contact-box button:hover {
            background-color: #ffa500;
        }

        #message {
            margin-top: 15px;
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }

            .header ul {
                flex-direction: column;
                gap: 10px;
            }

            .contact-box {
                width: 90%;
                padding: 30px 20px;
            }

            .contact-box input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Smart City</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="weather.html">Weather</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="contact-box">
        <form id="contactForm">
            <h1>Contact Us 📧</h1>
            <input type="text" id="name" placeholder="Enter your name" >
            <input type="email" id="email" placeholder="Enter your email">
            <button type="submit">Submit</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            if (name === "") {
                messageDiv.style.color = 'red';
                messageDiv.innerText = 'Please enter your name!';
                return;
            }

            if (email === "") {
                messageDiv.style.color = 'red';
                messageDiv.innerText = 'Please enter your email!';
                return;
            }

            let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
            contacts.push({ name, email });
            localStorage.setItem('contacts', JSON.stringify(contacts));

            messageDiv.style.color = 'green';
            messageDiv.innerText = 'Your data has been saved in Local Storage! 🎉';

            form.reset();
        });
    </script>
</body>
</html>
